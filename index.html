<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミリ秒時計</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
  }
  #hm {
    font-size: 8vw;
    color: #666666;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  #ss_ms {
    font-size: 22vw;
    font-weight: bold;
    color: #ffffff;
    letter-spacing: 2px;
    line-height: 1;
  }
  #date {
    font-size: 3.5vw;
    color: #555555;
    margin-top: 16px;
  }
</style>
</head>
<body>
  <div id="hm">00:00</div>
  <div id="ss_ms">00.000</div>
  <div id="date"></div>
  <script>
    function fmt(n, d) { return String(n).padStart(d, '0'); }
    function tick() {
      const now = new Date();
      const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
      document.getElementById('hm').textContent = fmt(h,2)+':'+fmt(m,2);
      document.getElementById('ss_ms').textContent = fmt(s,2)+'.'+fmt(ms,3);
      document.getElementById('date').textContent =
        now.getFullYear()+'/'+(now.getMonth()+1).toString().padStart(2,'0')+'/'+fmt(now.getDate(),2);
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
